<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="@bianca –– Notes on software engineering, infrastructure and technical leadership." />
  <meta name="theme-color" content="#FFF8F6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1F1A1C" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap"
    rel="stylesheet" />
  <title>@bianca</title>
  <script>
    // Prevent FOUC: apply theme before first paint
    ; (function () {
      const saved = localStorage.getItem('handle-theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      const theme = saved || (prefersDark ? 'dark' : 'light')
      document.documentElement.setAttribute('data-theme', theme)
    })()
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
